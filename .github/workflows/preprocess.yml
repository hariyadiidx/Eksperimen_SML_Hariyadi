import os

# Create the directory first
workflow_dir = "Eksperimen_SML_Hariyadi/workflow"
os.makedirs(workflow_dir, exist_ok=True)

# Define the content to be written
yml_content = """
name: Automated Data Preprocessing

on:
  push:
    paths:
      - 'dataset_raw/**'
      - 'automate_Hariyadi.py'
      - 'workflow/preprocess.yml'

jobs:
  preprocessing_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Diperlukan agar bot bisa push data kembali ke repo

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v3

      - name: 2. Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn numpy

      - name: 4. Run Preprocessing Script
        run: python automate_Hariyadi.py

      - name: 5. Commit and Push Processed Data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dataset_preprocessing/
          git commit -m "Auto-update processed dataset via GitHub Actions" || echo "No changes to commit"
          git push
"""

# Write the content to the file
file_path = os.path.join(workflow_dir, "preprocess.yml")
with open(file_path, "w") as f:
    f.write(yml_content)

print(f"✅ Workflow file '{file_path}' successfully created.")
